<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grid Bot</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #0a0e14;
  color: #c8d8e8;
  font-family: 'Courier New', monospace;
  font-size: 13px;
}

header {
  background: #0d1219;
  border-bottom: 1px solid #1e2d3d;
  padding: 14px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.titulo { font-size: 15px; font-weight: bold; letter-spacing: 2px; color: #e0eaf4; }
.titulo span { color: #00c8ff; }
.estado-wrap { display: flex; align-items: center; gap: 12px; font-size: 12px; color: #4a6070; }
.dot { width: 7px; height: 7px; border-radius: 50%; background: #ff4444; display: inline-block; }
.dot.on { background: #00e676; animation: bl 2s infinite; }
@keyframes bl { 0%,100%{opacity:1} 50%{opacity:.2} }

.main { padding: 20px 24px; max-width: 1100px; margin: 0 auto; }

/* ── CARDS ── */
.cards {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 10px;
  margin-bottom: 18px;
}
.card {
  background: #0d1219;
  border: 1px solid #1e2d3d;
  border-radius: 4px;
  padding: 14px 16px;
  border-top: 2px solid #1e2d3d;
}
.card.azul   { border-top-color: #00c8ff; }
.card.verde  { border-top-color: #00e676; }
.card.amaril { border-top-color: #ffb800; }
.card.rojo   { border-top-color: #ff5555; }
.card.lila   { border-top-color: #aa80ff; }

.lbl { font-size: 10px; color: #4a6070; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 7px; }
.val { font-size: 22px; font-weight: bold; line-height: 1; }
.sub { font-size: 11px; color: #4a6070; margin-top: 5px; }

.pos  { color: #00e676; }
.neg  { color: #ff5555; }
.acc  { color: #00c8ff; }
.gris { color: #6a8090; }

/* ── SECCIÓN ── */
.seccion {
  background: #0d1219;
  border: 1px solid #1e2d3d;
  border-radius: 4px;
  overflow: hidden;
  margin-bottom: 14px;
}
.sec-head {
  background: #101820;
  border-bottom: 1px solid #1e2d3d;
  padding: 8px 14px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.sec-titulo { font-size: 11px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; color: #6a8090; }
.sec-info   { font-size: 11px; color: #4a6070; }

/* ── TABLA ── */
table { width: 100%; border-collapse: collapse; }
th {
  font-size: 10px; color: #4a6070;
  text-transform: uppercase; letter-spacing: 0.5px;
  padding: 8px 14px; text-align: left;
  background: #101820; border-bottom: 1px solid #1e2d3d;
}
td {
  padding: 9px 14px;
  border-bottom: 1px solid #111922;
  font-size: 12px;
}
tr:last-child td { border-bottom: none; }
tr:hover td { background: #111922; }
.vacio { text-align: center; color: #4a6070; padding: 22px; font-size: 12px; }

@media (max-width: 800px) {
  .cards { grid-template-columns: repeat(3, 1fr); }
}
@media (max-width: 500px) {
  .cards { grid-template-columns: repeat(2, 1fr); }
  .main  { padding: 12px; }
}
</style>
</head>
<body>

<header>
  <div class="titulo">GRID<span>BOT</span> — ETH/USDT</div>
  <div class="estado-wrap">
    <span class="dot" id="dot"></span>
    <span id="estado-txt">conectando...</span>
    <span id="hora-txt"></span>
  </div>
</header>

<div class="main">

  <!-- MÉTRICAS -->
  <div class="cards">
    <div class="card azul">
      <div class="lbl">Precio ETH</div>
      <div class="val acc" id="v-precio">—</div>
      <div class="sub" id="v-rango">—</div>
    </div>
    <div class="card verde">
      <div class="lbl">PnL Total</div>
      <div class="val" id="v-pnl-total">—</div>
      <div class="sub" id="v-pnl-pct">—</div>
    </div>
    <div class="card amaril">
      <div class="lbl">PnL Diario</div>
      <div class="val" id="v-pnl-diario">—</div>
      <div class="sub" id="v-pnl-flot">flotante: —</div>
    </div>
    <div class="card lila">
      <div class="lbl">Trades</div>
      <div class="val" id="v-trades">—</div>
      <div class="sub" id="v-ciclos">—</div>
    </div>
    <div class="card rojo">
      <div class="lbl">Posiciones</div>
      <div class="val" id="v-npos">—</div>
      <div class="sub" id="v-cap-usado">—</div>
    </div>
  </div>

  <!-- POSICIONES ABIERTAS -->
  <div class="seccion">
    <div class="sec-head">
      <span class="sec-titulo">Posiciones Abiertas</span>
      <span class="sec-info" id="cnt-pos">0</span>
    </div>
    <div id="pos-body">
      <div class="vacio">sin posiciones abiertas</div>
    </div>
  </div>

  <!-- HISTORIAL -->
  <div class="seccion">
    <div class="sec-head">
      <span class="sec-titulo">Historial de Operaciones</span>
      <span class="sec-info" id="cnt-hist">0 trades</span>
    </div>
    <div id="hist-body" style="overflow-x:auto">
      <div class="vacio">sin historial</div>
    </div>
  </div>

</div>

<script>
const $  = id => document.getElementById(id);
const f2 = n  => (n == null ? '—' : parseFloat(n).toFixed(2));
const f4 = n  => (n == null ? '—' : parseFloat(n).toFixed(4));
const fp = n  => { const v = parseFloat(n || 0); return (v >= 0 ? '+' : '') + v.toFixed(4); };
const cc = n  => parseFloat(n) > 0 ? 'pos' : parseFloat(n) < 0 ? 'neg' : '';

function render(d) {
  // Header
  $('dot').className        = d.bot_activo ? 'dot on' : 'dot';
  $('estado-txt').textContent = d.bot_activo ? 'bot activo' : 'bot inactivo';
  $('hora-txt').textContent   = d.ultima_update || '';

  // Precio
  $('v-precio').textContent = '$' + f2(d.precio);
  $('v-rango').textContent  = d.precio_min
    ? 'rango: ' + f2(d.precio_min) + ' — ' + f2(d.precio_max)
    : '—';

  // PnL total
  const pt = parseFloat(d.pnl_total || 0);
  $('v-pnl-total').textContent   = (pt >= 0 ? '+' : '') + f4(pt) + ' USDT';
  $('v-pnl-total').className     = 'val ' + cc(pt);
  $('v-pnl-pct').textContent     = ((pt / 200) * 100).toFixed(2) + '% del capital';

  // PnL diario
  const pd = parseFloat(d.pnl_diario || 0);
  $('v-pnl-diario').textContent  = (pd >= 0 ? '+' : '') + f4(pd) + ' USDT';
  $('v-pnl-diario').className    = 'val ' + cc(pd);
  const pf = parseFloat(d.pnl_flotante || 0);
  $('v-pnl-flot').textContent    = 'flotante: ' + (pf >= 0 ? '+' : '') + f4(pf) + ' USDT';

  // Trades
  $('v-trades').textContent  = d.trades_total || 0;
  $('v-ciclos').textContent  = 'ciclos cerrados: ' + (d.ciclos || 0);

  // Posiciones abiertas (count)
  const pos = d.posiciones_abiertas || [];
  $('v-npos').textContent    = pos.length;
  $('cnt-pos').textContent   = pos.length;
  const capUsado = pos.length * (200 / 10);
  $('v-cap-usado').textContent = 'capital: ' + capUsado.toFixed(0) + ' USDT';

  // Tabla posiciones abiertas
  if (pos.length) {
    $('pos-body').innerHTML = `<table>
      <thead><tr>
        <th>Nivel</th><th>Precio entrada</th><th>Capital</th>
        <th>Valor actual</th><th>PnL flotante</th><th>Hora compra</th>
      </tr></thead>
      <tbody>${pos.map(p => {
        const pf = parseFloat(p.pnl_flot || 0);
        return `<tr>
          <td><b>${p.nivel}</b></td>
          <td>$${f2(p.p_compra)}</td>
          <td>${f2(p.valor_usdt)} USDT</td>
          <td>${f2(p.valor_act)} USDT</td>
          <td class="${cc(pf)}">${fp(pf)} USDT</td>
          <td class="gris">${p.hora_compra || '—'}</td>
        </tr>`;
      }).join('')}</tbody>
    </table>`;
  } else {
    $('pos-body').innerHTML = '<div class="vacio">sin posiciones abiertas</div>';
  }

  // Historial
  const hist = d.historial || [];
  $('cnt-hist').textContent = hist.length + ' trades';
  if (hist.length) {
    $('hist-body').innerHTML = `<table>
      <thead><tr>
        <th>Hora venta</th><th>Nivel</th><th>Compra</th>
        <th>Venta</th><th>Capital</th><th>PnL</th>
      </tr></thead>
      <tbody>${hist.map(h => {
        const pnl = parseFloat(h.pnl || 0);
        return `<tr>
          <td class="gris">${h.hora_venta || '—'}</td>
          <td>${h.nivel}</td>
          <td>$${f2(h.p_compra)}</td>
          <td>$${f2(h.p_venta)}</td>
          <td>${f2(h.capital)} USDT</td>
          <td class="${cc(pnl)}">${fp(pnl)} USDT</td>
        </tr>`;
      }).join('')}</tbody>
    </table>`;
  } else {
    $('hist-body').innerHTML = '<div class="vacio">sin historial aún</div>';
  }
}

async function poll() {
  try {
    const r = await fetch('/api/estado');
    if (!r.ok) throw new Error(r.status);
    render(await r.json());
  } catch (e) {
    $('dot').className        = 'dot';
    $('estado-txt').textContent = 'sin conexión — ' + e.message;
  }
}

poll();
setInterval(poll, 10000);
</script>
</body>
</html>
